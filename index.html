<!DOCTYPE html>
<html lang="es" x-data="app()" x-init="init()" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Al Fogonazo | Pollo Asado y Carnes en Cancún</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Kodchasan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#DC2626',
                        secondary: '#F97316',
                        darkBg: '#0B0B0B',
                        darkCard: '#18181B',
                    },
                    fontFamily: {
                        sans: ['Kodchasan', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('app', () => ({
                splash: true,
                darkMode: true,
                activeCategory: 'POLLOS',
                isCartOpen: false,
                isCheckoutOpen: false,
                searchQuery: '',
                currentSlide: 0,
                step: 1,

                // Variables para Swipe de categorías
                touchStartX: 0,
                touchEndX: 0,

                user: { name: '', phone: '', paymentMethod: 'Efectivo', changeOf: '' },
                location: null,
                address: '',
                distance: 0,
                deliveryFee: 0,
                cart: [],

                restaurantCoords: { latitude: 21.187402, longitude: -86.836798 },
                whatsappNumber: "5219983170365",

                promos: [
                    { id: 1, title: 'Combo Familiar', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800', waText: 'Hola, me interesa la promoción de Combo Familiar' },
                    { id: 2, title: 'Costillas Especiales', img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=800', waText: 'Hola, me interesa la promoción de Costillas Especiales' },
                    { id: 3, title: 'Arrachera Premium', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800', waText: 'Hola, me interesa la promoción de Arrachera' }
                ],

                products: [
                    { id: 1, product_name: "1 POLLO SINALOA", product_description: "Pollo marinado estilo Sinaloa, acompañado de arroz, frijol, salsa picante, tortilla", price: 195.00, category: "POLLOS" },
                    { id: 2, product_name: "1/2 POLLO SINALOA", product_description: "Pollo marinado estilo Sinaloa, acompañado de arroz, puré de papa, salsa picante, tortilla", price: 145.00, category: "POLLOS" },
                    { id: 3, product_name: "1 POLLO + CEBOLLA + PAPA", product_description: "1 Pollo asado sinaloa, más cebolla asada, papa asada con crema especial y tocino, arroz, pure de papa, salsa, tortillas.", price: 250.00, category: "POLLOS" },
                    { id: 4, product_name: "1/4 Costilla BBQ", product_description: "Costillas premium bañadas en salsa artesanal BBQ.", price: 130.00, category: "COSTILLAS" },
                    { id: 5, product_name: "1KG Costilla BBQ", product_description: "Un kilo de nuestras mejores costillas ahumadas al fogón.", price: 400.00, category: "COSTILLAS" },
                    { id: 8, product_name: "1/4 de Arrachera", product_description: "Acompañado de arroz, puré de papa, salsa picante y tortillas", price: 130.00, category: "ARRACHERA" },
                    { id: 14, product_name: "1/2 Arrachera Combo", product_description: "Medio de arrachera, 1 cebolla asada, 1 papa asada con crema especial con tocino, arroz, frijol y salsa picante", price: 250.00, category: "COMBOS" },
                    { id: 15, product_name: "1 PAPA CON ARRACHERA", product_description: "Papa asada con nuestra crema especial con tocino y arrachera.", price: 90.00, category: "EXTRAS" },
                    { id: 16, product_name: "1 PAPA NORMAL", product_description: "Papa asada con crema especial y tocino.", price: 50.00, category: "EXTRAS" },
                    { id: 17, product_name: "1 CEBOLLA", product_description: "Cebolla asada al carbón.", price: 45.00, category: "EXTRAS" },
                    { id: 18, product_name: "½ TORTILLA", product_description: "Medio kilo de tortilla caliente.", price: 30.00, category: "EXTRAS" }
                ],

                init() {
                    const savedCart = localStorage.getItem('fogonazo_cart');
                    if (savedCart) this.cart = JSON.parse(savedCart);

                    const savedTheme = localStorage.getItem('theme');
                    if (!savedTheme || savedTheme === 'dark') {
                        this.darkMode = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.darkMode = false;
                        document.documentElement.classList.remove('dark');
                    }

                    setInterval(() => {
                        this.currentSlide = (this.currentSlide + 1) % this.promos.length;
                    }, 5000);

                    setTimeout(() => { this.splash = false; }, 1800);
                },

                get categories() {
                    return [...new Set(this.products.map(p => p.category))];
                },

                // Lógica de Swipe para categorías
                handleSwipe() {
                    const diff = this.touchStartX - this.touchEndX;
                    const threshold = 50; // Mínimo de píxeles para detectar el swipe
                    const currentIndex = this.categories.indexOf(this.activeCategory);

                    if (Math.abs(diff) > threshold) {
                        if (diff > 0 && currentIndex < this.categories.length - 1) {
                            // Swipe izquierda -> siguiente categoría
                            this.activeCategory = this.categories[currentIndex + 1];
                            this.scrollToActiveCategory();
                        } else if (diff < 0 && currentIndex > 0) {
                            // Swipe derecha -> categoría anterior
                            this.activeCategory = this.categories[currentIndex - 1];
                            this.scrollToActiveCategory();
                        }
                    }
                },

                scrollToActiveCategory() {
                    this.$nextTick(() => {
                        const activeBtn = document.getElementById('cat-' + this.activeCategory);
                        if (activeBtn) {
                            activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                        }
                    });
                },

                get filteredProducts() {
                    let filtered = this.products;
                    if (this.searchQuery) {
                        filtered = filtered.filter(p => p.product_name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                    } else {
                        filtered = filtered.filter(p => p.category === this.activeCategory);
                    }
                    return filtered;
                },

                get cartTotal() { return this.cart.reduce((acc, i) => acc + (i.price * i.quantity), 0); },
                get cartCount() { return this.cart.reduce((acc, i) => acc + i.quantity, 0); },

                addToCart(p) {
                    const exist = this.cart.find(i => i.id === p.id);
                    exist ? exist.quantity++ : this.cart.push({ ...p, quantity: 1 });
                    localStorage.setItem('fogonazo_cart', JSON.stringify(this.cart));
                },

                updateQty(id, delta) {
                    const item = this.cart.find(i => i.id === id);
                    if (item) {
                        item.quantity += delta;
                        if (item.quantity <= 0) this.cart = this.cart.filter(i => i.id !== id);
                    }
                    localStorage.setItem('fogonazo_cart', JSON.stringify(this.cart));
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    if (this.darkMode) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                },

                getUserLocation() {
                    if (!navigator.geolocation) {
                        alert("Tu navegador no soporta geolocalización");
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            this.location = {
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            };

                            // Generar link de Google Maps con coordenadas
                            this.address = `https://www.google.com/maps?q=${this.location.latitude},${this.location.longitude}`;

                            this.calculateDistance();
                        },
                        (error) => {
                            console.error(error);
                            alert("No se pudo obtener tu ubicación");
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 10000
                        }
                    );
                },

                calculateDistance() {
                    const toRad = x => (x * Math.PI) / 180;
                    const R = 6371;
                    const dLat = toRad(this.location.latitude - this.restaurantCoords.latitude);
                    const dLon = toRad(this.location.longitude - this.restaurantCoords.longitude);
                    const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(this.restaurantCoords.latitude)) * Math.cos(toRad(this.location.latitude)) * Math.sin(dLon / 2) ** 2;
                    this.distance = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));

                    const pricing = [
                        { min: 0.0, max: 3.0, base: 40 },
                        { min: 3.1, max: 5.0, base: 50 },
                        { min: 5.1, max: 7.0, base: 60 },
                        { min: 7.1, max: 9.0, base: 70 },
                        { min: 9.1, max: 10.9, base: 80 },
                        { min: 11.0, max: 11.9, base: 90 },
                        { min: 12.0, max: Infinity, base: 100, extra: 10 }
                    ];

                    const tier = pricing.find(p => this.distance >= p.min && this.distance <= p.max) || pricing[6];
                    this.deliveryFee = tier.max === Infinity ? tier.base + (Math.ceil(Math.max(0, this.distance - 12)) * tier.extra) : tier.base;
                },

                sendWhatsApp(customText = null) {
                    if (customText) {
                        window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(customText)}`, '_blank');
                        return;
                    }

                    const items = this.cart.map(i => `- ${i.quantity}x ${i.product_name} ($${i.price * i.quantity})`).join('\n');
                    const payment = this.user.paymentMethod === 'Efectivo'
                        ? `Efectivo (El cliente pagará con billete de: $${this.user.changeOf || 'Cambio exacto'})`
                        : this.user.paymentMethod;

                    const text = `🔥 *PEDIDO - AL FOGONAZO*\n\n👤 *Cliente:* ${this.user.name}\n📞 *Tel:* ${this.user.phone}\n📍 *Ubicación:* ${this.address}\n\n📏 *Distancia:* ${this.distance.toFixed(1)}km\n🚚 *Envío:* $${this.deliveryFee}\n\n🍗 *Productos:*\n${items}\n\n💳 *Método de Pago:* ${payment}\n💰 *TOTAL:* $${this.cartTotal + this.deliveryFee}`;
                    window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(text)}`, '_blank');
                }
            }));
        });
    </script>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bottom-sheet-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        html.dark body { background-color: #0B0B0B; color: white; }

        /* Estilo para indicar que el área de categorías es interactiva */
        .category-scroll-hint {
            position: relative;
        }
        .category-scroll-hint::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(to left, rgba(11,11,11,0.8), transparent);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-darkBg transition-colors" :class="{ 'dark': darkMode }">

    <!-- Splash Screen -->
    <div x-show="splash" class="fixed inset-0 z-[100] bg-[#050505] flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-2xl animate-pulse">
            <i class="fas fa-fire text-white text-4xl"></i>
        </div>
        <h1 class="mt-6 text-white text-2xl font-bold tracking-widest uppercase">AL FOGONAZO</h1>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/90 dark:bg-darkBg/95 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b dark:border-gray-800">
        <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg"><i class="fas fa-fire text-white"></i></div>
            <span class="font-bold text-xl dark:text-white uppercase tracking-tight">Al Fogonazo</span>
        </div>
        <button @click="toggleTheme()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-gray-600 dark:text-gray-300 active:rotate-45 transition-transform">
            <i class="fas" :class="darkMode ? 'fa-sun' : 'fa-moon'"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto pb-32" x-show="!splash" x-cloak>
        <!-- Carrousel Promocional -->
        <div class="px-6 mt-4">
            <div class="relative h-44 rounded-3xl overflow-hidden shadow-2xl bg-gray-200 dark:bg-darkCard">
                <template x-for="(promo, index) in promos" :key="promo.id">
                    <div x-show="currentSlide === index"
                         x-transition:enter="transition ease-out duration-700"
                         x-transition:enter-start="opacity-0 translate-x-12"
                         x-transition:enter-end="opacity-100 translate-x-0"
                         x-transition:leave="transition ease-in duration-700"
                         x-transition:leave-start="opacity-100 translate-x-0"
                         x-transition:leave-end="opacity-0 -translate-x-12"
                         @click="sendWhatsApp(promo.waText)"
                         class="absolute inset-0 cursor-pointer">
                        <img :src="promo.img" class="w-full h-full object-cover" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex flex-col justify-end p-6">
                            <span class="text-primary font-bold text-xs uppercase tracking-widest mb-1">Oferta de Hoy</span>
                            <h2 class="text-white text-2xl font-bold" x-text="promo.title"></h2>
                            <p class="text-white/70 text-xs">¡Toca para aprovechar!</p>
                        </div>
                    </div>
                </template>
                <div class="absolute top-4 right-6 flex gap-1.5">
                    <template x-for="(promo, index) in promos">
                        <div class="h-1 rounded-full transition-all duration-300"
                             :class="currentSlide === index ? 'w-6 bg-primary' : 'w-2 bg-white/40'"></div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="px-6 mt-6">
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                <input type="text"
                       x-model="searchQuery"
                       placeholder="Busca tu antojo..."
                       class="w-full bg-white dark:bg-darkCard dark:text-white dark:border-gray-800 border py-4 pl-12 pr-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
        </div>

        <!-- Categorías (Slider Control con soporte Swipe) -->
        <div x-show="!searchQuery"
             @touchstart="touchStartX = $event.touches[0].clientX"
             @touchend="touchEndX = $event.changedTouches[0].clientX; handleSwipe()"
             class="mt-6 overflow-x-auto no-scrollbar flex px-6 gap-3 sticky top-[72px] bg-gray-50/80 dark:bg-darkBg/95 py-3 z-30 transition-all cursor-grab active:cursor-grabbing">
            <template x-for="cat in categories" :key="cat">
                <button :id="'cat-' + cat"
                    @click="activeCategory = cat; scrollToActiveCategory()"
                    class="px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm whitespace-nowrap border"
                    :class="activeCategory === cat ? 'bg-primary border-primary text-white scale-105' : 'bg-white dark:bg-darkCard dark:border-gray-800 text-gray-500 dark:text-gray-400'">
                    <span x-text="cat"></span>
                </button>
            </template>
        </div>

        <!-- Lista de Productos -->
        <!-- Se añade swipe también al área de contenido para cambiar de categoría al deslizar sobre los productos -->
        <div class="px-6 mt-4 space-y-4"
             @touchstart="touchStartX = $event.touches[0].clientX"
             @touchend="touchEndX = $event.changedTouches[0].clientX; handleSwipe()">
            <template x-for="p in filteredProducts" :key="p.id">
                <div class="flex bg-white dark:bg-darkCard rounded-2xl p-3 shadow-sm border dark:border-gray-800 hover:border-primary/30 transition-all animate-slide-up">
                    <div class="w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-xl overflow-hidden flex-shrink-0">
                        <img :src="'https://images.unsplash.com/photo-1615557960916-5f4791effe9d?w=200'" class="w-full h-full object-cover">
                    </div>
                    <div class="ml-4 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="text-sm font-bold dark:text-white uppercase leading-tight" x-text="p.product_name"></h3>
                            <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-1 line-clamp-2" x-text="p.product_description"></p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-primary text-lg" x-text="'$' + p.price"></span>
                            <button @click="addToCart(p)" class="bg-primary text-white p-2.5 rounded-xl shadow-md active:scale-90 transition-transform">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredProducts.length === 0" class="text-center py-20 opacity-50 dark:text-white">
                <i class="fas fa-hamburger text-4xl mb-3"></i>
                <p>No encontramos nada parecido...</p>
            </div>
        </div>
    </main>

    <!-- Barra Flotante Carrito -->
    <div x-show="cart.length > 0" x-cloak class="fixed bottom-0 left-0 right-0 p-4 z-40 flex justify-center">
        <button @click="isCartOpen = true" class="w-full max-w-md bg-primary text-white h-16 rounded-2xl flex justify-between items-center px-6 shadow-2xl shadow-primary/30 active:scale-[0.98] transition-transform">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-shopping-basket"></i></div>
                <div class="text-left leading-none">
                    <p class="font-bold" x-text="cartCount + ' productos'"></p>
                    <p class="text-[10px] uppercase font-bold opacity-70">Ver mi pedido</p>
                </div>
            </div>
            <span class="font-bold text-xl" x-text="'$' + cartTotal"></span>
        </button>
    </div>

    <!-- Modal Carrito -->
    <div x-show="isCartOpen" x-cloak class="fixed inset-0 z-50 flex items-end justify-center bottom-sheet-overlay">
        <div class="absolute inset-0" @click="isCartOpen = false"></div>
        <div class="relative w-full max-w-md bg-white dark:bg-darkCard rounded-t-[2.5rem] shadow-2xl animate-slide-up max-h-[85vh] flex flex-col">
            <div class="flex justify-center py-4"><div class="w-12 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full"></div></div>

            <div class="px-8 pb-4 flex justify-between items-center border-b dark:border-gray-800">
                <h3 class="text-2xl font-bold dark:text-white uppercase tracking-tight">Tu Pedido</h3>
                <button @click="isCartOpen = false" class="text-gray-400 p-1"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>

            <div class="overflow-y-auto p-8 flex-1 space-y-6">
                <template x-for="item in cart" :key="item.id">
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm dark:text-white uppercase leading-none mb-1" x-text="item.product_name"></h4>
                            <span class="text-primary font-bold text-sm" x-text="'$' + (item.price * item.quantity)"></span>
                        </div>
                        <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-2xl p-1">
                            <button @click="updateQty(item.id, -1)" class="w-8 h-8 flex items-center justify-center dark:text-white"><i class="fas fa-minus text-xs"></i></button>
                            <span class="w-8 text-center font-bold dark:text-white text-sm" x-text="item.quantity"></span>
                            <button @click="updateQty(item.id, 1)" class="w-8 h-8 flex items-center justify-center dark:text-white"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                </template>
            </div>

            <div class="p-8 bg-gray-50 dark:bg-black/20 border-t dark:border-gray-800">
                <button @click="isCartOpen = false; isCheckoutOpen = true" class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg shadow-lg">Confirmar y Pagar</button>
            </div>
        </div>
    </div>

    <!-- Modal Checkout -->
    <div x-show="isCheckoutOpen" x-cloak class="fixed inset-0 z-50 flex items-end justify-center bottom-sheet-overlay">
        <div class="absolute inset-0" @click="isCheckoutOpen = false"></div>
        <div class="relative w-full max-w-md bg-white dark:bg-darkCard rounded-t-[2.5rem] animate-slide-up max-h-[90vh] flex flex-col">
            <div class="flex justify-center py-4"><div class="w-12 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full"></div></div>

            <div class="px-8 pb-4 border-b dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-2xl font-bold dark:text-white uppercase">Checkout</h3>
                    <button @click="isCheckoutOpen = false" class="text-gray-400 p-1"><i class="fas fa-times-circle text-2xl"></i></button>
                </div>
                <div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                    <button @click="step = 1" class="flex-1 py-2 text-[10px] font-black rounded-lg transition-all" :class="step === 1 ? 'bg-white dark:bg-gray-700 shadow-sm dark:text-white' : 'text-gray-500 opacity-60'">1. ENVÍO</button>
                    <button :disabled="!user.name || !address" @click="step = 2" class="flex-1 py-2 text-[10px] font-black rounded-lg transition-all" :class="step === 2 ? 'bg-white dark:bg-gray-700 shadow-sm dark:text-white' : 'text-gray-500 opacity-60'">2. PAGO</button>
                </div>
            </div>

            <div class="overflow-y-auto p-8 flex-1 space-y-6">
                <!-- Paso 1: Datos y Ubicación -->
                <div x-show="step === 1" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">¿Quién recibe?</label>
                        <input type="text" x-model="user.name" placeholder="Tu nombre completo" class="w-full bg-gray-50 dark:bg-gray-800 dark:text-white rounded-2xl py-4 px-6 border dark:border-gray-700 focus:border-primary outline-none transition-colors">
                        <input type="tel" x-model="user.phone" placeholder="Tu WhatsApp (10 dígitos)" class="w-full bg-gray-50 dark:bg-gray-800 dark:text-white rounded-2xl py-4 px-6 border dark:border-gray-700 focus:border-primary outline-none transition-colors">
                    </div>

                    <div class="p-6 border-2 border-dashed dark:border-gray-700 rounded-3xl text-center space-y-4">
                        <template x-if="!address">
                            <div class="space-y-3">
                                <i class="fas fa-map-marked-alt text-3xl text-primary opacity-30"></i>
                                <p class="text-sm dark:text-gray-400 font-medium">Fija tu ubicación para el envío</p>
                                <button @click="getUserLocation()" class="bg-primary text-white px-6 py-3 rounded-xl font-black text-xs active:scale-95 transition-transform">📍 OBTENER UBICACIÓN</button>
                            </div>
                        </template>
                        <template x-if="address">
                            <div class="text-left space-y-2">
                                <p class="text-xs dark:text-white font-medium">
                                    Ubicación obtenida correctamente 📍
                                </p>
                                <a :href="address" target="_blank" class="text-primary text-xs underline">
                                    Ver en mapa
                                </a>
                            </div>
                        </template>
                    </div>

                    <button :disabled="!user.name || !address" @click="step = 2" class="w-full bg-primary text-white py-4 rounded-2xl font-black disabled:opacity-30 transition-all uppercase text-sm tracking-widest shadow-xl shadow-primary/20">Continuar</button>
                </div>

                <!-- Paso 2: Pago y Confirmación -->
                <div x-show="step === 2" class="space-y-6">
                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Método de Pago</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button @click="user.paymentMethod = 'Efectivo'"
                                    class="py-4 border-2 rounded-2xl font-bold transition-all text-sm"
                                    :class="user.paymentMethod === 'Efectivo' ? 'border-primary bg-primary/5 text-primary' : 'border-gray-100 dark:border-gray-800 dark:text-gray-400 opacity-50'">
                                <i class="fas fa-money-bill-wave mb-2 text-lg block"></i> Efectivo
                            </button>
                            <button @click="user.paymentMethod = 'Tarjeta (Terminal)'"
                                    class="py-4 border-2 rounded-2xl font-bold transition-all text-sm"
                                    :class="user.paymentMethod === 'Tarjeta (Terminal)' ? 'border-primary bg-primary/5 text-primary' : 'border-gray-100 dark:border-gray-800 dark:text-gray-400 opacity-50'">
                                <i class="fas fa-credit-card mb-2 text-lg block"></i> Tarjeta
                            </button>
                        </div>

                        <div x-show="user.paymentMethod === 'Efectivo'" x-transition class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-2xl border dark:border-gray-700">
                            <p class="text-[10px] text-gray-400 font-black uppercase mb-3 tracking-wider">¿Con cuánto pagas? (Billetes)</p>
                            <div class="flex gap-2">
                                <template x-for="val in [200, 500, 1000]">
                                    <button @click="user.changeOf = val"
                                            class="flex-1 py-2 text-xs font-bold rounded-lg border dark:border-gray-700 transition-all"
                                            :class="user.changeOf == val ? 'bg-primary text-white border-primary' : 'dark:text-white'">
                                        $<span x-text="val"></span>
                                    </button>
                                </template>
                            </div>
                            <input type="number" x-model="user.changeOf" placeholder="Otro monto" class="w-full mt-3 bg-white dark:bg-gray-800 dark:text-white rounded-xl py-2 px-4 outline-none border dark:border-gray-700 text-sm">
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-black/40 p-6 rounded-3xl space-y-3 border dark:border-gray-800 shadow-inner">
                        <div class="flex justify-between text-xs dark:text-gray-400 font-medium"><span>Subtotal</span><span x-text="'$' + cartTotal"></span></div>
                        <div class="flex justify-between text-xs dark:text-gray-400 font-medium"><span>Costo de Envío</span><span class="text-orange-500 font-bold" x-text="'$' + deliveryFee"></span></div>
                        <div class="pt-3 border-t dark:border-gray-700 flex justify-between items-center">
                            <span class="font-black dark:text-white tracking-widest text-xs uppercase">Total a pagar</span>
                            <span class="text-3xl font-black text-primary" x-text="'$' + (cartTotal + deliveryFee)"></span>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button @click="step = 1" class="w-16 bg-gray-100 dark:bg-gray-800 rounded-2xl text-gray-500 active:scale-95 transition-all"><i class="fas fa-chevron-left"></i></button>
                        <button @click="sendWhatsApp()" class="flex-1 bg-[#25D366] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl shadow-green-500/20 active:scale-95 transition-transform uppercase text-sm tracking-widest">
                            <i class="fab fa-whatsapp text-2xl"></i> Enviar Pedido
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
          if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('Service Worker registrado'))
      .catch(err => console.log('Error al registrar SW', err));
  }
    </script>
</body>
</html>
